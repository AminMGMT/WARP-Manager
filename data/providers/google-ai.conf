name=Gemini & Google AI
type=domain
# Broad Google coverage: the Gemini app hits many *.google.com / *.googleapis.com
# subdomains, so route all of Google through WARP. YouTube is carved back out to
# direct in the engine (singbox youtube exclusion) so heavy video stays off WARP.
# gstatic.com is deliberately NOT here: it is a static CDN (never geo-blocked) and
# client apps (V2rayNG & co) measure their "config ping" against
# www.gstatic.com/generate_204 — routing it through WARP ties every user's ping
# test to WARP's health and shows the tunnel as dead when WARP hiccups.
domains=google.com googleapis.com googleusercontent.com labs.google notebooklm.google
